name: Android APK

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Pgyer release notes
        required: false
        default: "0.1.4 transition login and contact onboarding fixes"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/release-android-pgyer.mjs"

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck --workspace @bie-rang-wo-xiaoshi/mobile

      - name: Test mobile app
        run: npm test --workspace @bie-rang-wo-xiaoshi/mobile

      - name: Make Gradle wrapper executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          NODE_ENV: production
          GRADLE_OPTS: -Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
        run: ./gradlew :app:assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon --max-workers=2 --console=plain

      - name: Show APK metadata
        run: |
          cat apps/mobile/android/app/build/outputs/apk/release/output-metadata.json
          ls -lh apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bie-rang-wo-xiaoshi-android-0.1.4-arm64
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload APK to Pgyer
        if: ${{ env.PGYER_API_KEY != '' }}
        run: >
          npm run release:android:pgyer --
          --upload
          --skip-build
          --skip-tests
          --skip-typecheck
          --description "${{ github.event.inputs.release_notes || '0.1.4 transition login and contact onboarding fixes' }}"
