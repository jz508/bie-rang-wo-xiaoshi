name: Trigger expired countdowns

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: trigger-expired-countdowns
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call production trigger endpoint
        env:
          APP_URL: https://bie-rang-wo-xiaoshi-web.vercel.app
          CRON_SECRET: ${{ secrets.BIE_RANG_TRIGGER_CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET"
          curl --fail-with-body --silent --show-error --max-time 45 \
            "$APP_URL/api/cron/trigger-expired" \
            -H "Authorization: Bearer $CRON_SECRET"
